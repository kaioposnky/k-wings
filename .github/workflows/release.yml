name: Release

on:
  push:
    tags:
      - "release-*"

env:
  BIN_NAME: wings-rs
  PROJECT_NAME: wings-rs

jobs:
  dist:
    name: Dist
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        build:
          - x86_64-linux
        include:
          - build: x86_64-linux
            os: ubuntu-24.04
            target: x86_64-unknown-linux-musl

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          cache-key: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Run cargo test
        run: cross test --release --target ${{ matrix.target }}

      - name: Build release binary
        run: |
          RUSTFLAGS="-C target-feature=+crt-static" \
          cross build --release --target ${{ matrix.target }}

      - name: Prepare binary with platform name
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/$BIN_NAME" "dist/$BIN_NAME-${{ matrix.build }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.build }}
          path: dist/${{ env.BIN_NAME }}-${{ matrix.build }}

  publish-draft-release:
    name: Publish Draft Release
    needs: [dist]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine if pre-release and strip prefix
        id: release_info
        run: |
          RAW_TAG="${{ github.ref_name }}"
          VERSION="${RAW_TAG#release-}"
          
          # Output the clean version to use as the Release Title
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_info.outputs.version }}
          draft: true
          prerelease: ${{ steps.release_info.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: artifacts/*/*

  create-multiarch-image:
    name: Create multi-arch Docker image
    needs: [dist]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare binaries
        run: |
          mkdir -p .docker/amd64
          cp dist/${{ env.PROJECT_NAME }}-x86_64-linux/${{ env.BIN_NAME }}-x86_64-linux .docker/amd64/calagopus-wings

          chmod +x .docker/*/calagopus-wings

      - name: Extract version and determine tags
        id: prep_tags
        run: |
          RAW_TAG="${{ github.ref_name }}"
          VERSION="${RAW_TAG#release-}"

          DOCKER_TAGS="ghcr.io/${{ github.repository }}:${VERSION}"

          if [[ "$VERSION" == *-* ]]; then
            DOCKER_TAGS="$DOCKER_TAGS,ghcr.io/${{ github.repository }}:latest-pre"
            
            if [[ "$VERSION" == 1.0.0-* ]]; then
              DOCKER_TAGS="$DOCKER_TAGS,ghcr.io/${{ github.repository }}:latest"
            fi
          else
            # 4. It's a stable release (no hyphen): Add 'latest'
            DOCKER_TAGS="$DOCKER_TAGS,ghcr.io/${{ github.repository }}:latest"
          fi

          echo "DOCKER_TAGS=$DOCKER_TAGS" >> $GITHUB_ENV

      - name: Build & push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.DOCKER_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
